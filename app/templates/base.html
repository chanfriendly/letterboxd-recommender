<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Letterboxd Recommender{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    .poster-card:hover .poster-overlay { opacity: 1; }
  </style>
</head>
<body class="bg-[#1a1a2e] text-gray-100 min-h-screen font-sans">
  <header class="border-b border-gray-700 px-6 py-4 flex items-center gap-3">
    <svg class="w-7 h-7 text-[#00c030]" fill="currentColor" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
    </svg>
    <span class="text-xl font-bold tracking-tight">Letterboxd Recommender</span>
    <nav class="ml-auto flex gap-4 text-sm">
      <a href="/" class="text-gray-400 hover:text-white transition">Home</a>
      <a href="/setup" class="text-gray-400 hover:text-white transition">Setup</a>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-sm py-8 border-t border-gray-800 space-y-2">
    <p class="text-gray-300 italic">For Andrea: My love, my life, for life.</p>
    <p class="text-gray-600">
      Film data via <a href="https://www.themoviedb.org" class="hover:text-gray-400 transition" target="_blank">TMDB</a>
      &bull; Ratings from <a href="https://letterboxd.com" class="hover:text-gray-400 transition" target="_blank">Letterboxd</a>
    </p>
  </footer>
</body>
</html>
