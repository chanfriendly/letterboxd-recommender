services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "8020:8000"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./data/letterboxd_rec.db
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - .:/app
      - ./data:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./data/letterboxd_rec.db
    depends_on:
      - redis
    restart: unless-stopped

  beat:
    build: .
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - .:/app
      - ./data:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./data/letterboxd_rec.db
    depends_on:
      - redis
      - worker
    restart: unless-stopped
