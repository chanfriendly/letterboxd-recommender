services:
  web-demo:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "8021:8000"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./data/letterboxd_rec.db
      - DEMO_MODE=true
    depends_on:
      - redis
    restart: unless-stopped
